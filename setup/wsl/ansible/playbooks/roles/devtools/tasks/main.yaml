# Add zoxide init to zsh
- name: Initialize zoxide in zsh
  lineinfile:
    path: "/home/{{ username }}/.zshrc"
    line: 'eval "$(zoxide init zsh)"'

# Add alias for zoxide
- name: Add zoxide aliases
  lineinfile:
    path: "/home/{{ username }}/.zshrc"
    line: "{{ item }}"
  loop:
    - "alias cd='z'"

# Add direnv init to zsh
- name: Enable direnv in zsh
  lineinfile:
    path: "/home/{{ username }}/.zshrc"
    line: 'eval "$(direnv hook zsh)"'

# Install tfenv (Terraform version manager)
- name: Clone tfenv repository
  git:
    repo: https://github.com/tfutils/tfenv.git
    dest: "/home/{{ username }}/.tfenv"
    version: master

- name: Add tfenv to PATH
  lineinfile:
    path: "/home/{{ username }}/.zshrc"
    line: 'export PATH="$HOME/.tfenv/bin:$PATH"'

# Install terraform versions with tfenv
- name: Install pinned Terraform version
  become_user: "{{ username }}"
  shell: |
    export PATH="$HOME/.tfenv/bin:$PATH"
    tfenv install {{ terraform_version }}
    tfenv use {{ terraform_version }}
  when: terraform_version is defined

# Add Terraform autocomplete
- name: Enable terraform autocomplete (zsh)
  lineinfile:
    path: "/home/{{ username }}/.zshrc"
    line: 'complete -C /usr/local/bin/terraform terraform'

# Add tfenv init to zsh
- name: Enable tfenv in shell
  lineinfile:
    path: "/home/{{ username }}/.zshrc"
    line: 'eval "$(tfenv init -)"'

