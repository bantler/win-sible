# ~/.config/starship.toml
scan_timeout = 100

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline     = true
command_timeout = 1000

# Sets user-defined palette
# Palettes must be defined _after_ this line
palette = 'bantler'

# Change the default prompt format
format = """\
[Ôò¡Ôò┤](238)\
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$fill\
$all\
[Ôò░ÔöÇ](238)\
$character"""

# Palette definitions
[palettes.bantler]
pink        = '#ff5eed'
purple      = '#ba5aff'
blue        = '#5c78ff'
lightblue   = '#5ac8ff'
green       = '#5effc3'
base        = '#d1d1d1'

[fill]
symbol = ' '

# Replace the 'ÔØ»' symbol in the prompt with 'ÔŞ£'
[character] # The name of the module we are configuring is 'character'
success_symbol = '[ÔØ»](bold green)' # The 'success_symbol' segment is being set to 'ÔŞ£' with the color 'bold green'

[os]
format      = '[$symbol](bold white) '
disabled    = false

[os.symbols]
Windows     = '¯İ¬ '
Arch        = '¾░úç'
Ubuntu      = '´îø '
Debian      = '´îå '
Alpine      = '´îÇ '
Android     = '´à╗ '
Raspbian    = '´îò '

# Shows the username
[username]
style_user  = 'pink bold'
style_root  = 'base bold'
format      = '[$user]($style) '
disabled    = false
show_always = true
aliases     = { 'bantl' = 'bantler' }

# Shows the hostname
[hostname]
ssh_only    = false
format      = 'on [$hostname](bold purple) '
disabled    = false

# Shows current directory
[directory]
truncation_length   = 3
truncation_symbol   = 'ÔÇĞ/'
home_symbol         = '¾░ï£ ~'
read_only_style     = '197'
read_only           = '´Çú '
format              = 'at [$path]($style)[$read_only]($read_only_style) '

# Shows current git branch
[git_branch]
symbol = '´çÆ '
format = 'via [$symbol$branch]($style)'

# truncation_length = 4
truncation_symbol   = 'ÔÇĞ/'
style               = 'bold green'

# Shows current git status
[git_status]
format      = '([ \($all_status $ahead_behind\)]($style))'
style       = 'bold base'
conflicted  = '[´ü¬ confliced=${count}](red)'
up_to_date  = '[¾░İ¢ up-to-date](green)'
untracked   = '[¾░ïù untracked=${count}](red)'
ahead       = '´é¬ ahead=${count}'
diverged    = '´é¬ ahead=${ahead_count} ´é½ behind=${behind_count}'
behind      = '´é½ behind=${count}'
stashed     = '[´èï stashed=${count}](green)'
modified    = '[¾░ø┐ modified=${count}](blue)'
staged      = '[¾░Éù staged=${count}](green)'
renamed     = '[¾▒ı© renamed=${count}](yellow)'
deleted     = '[¾░ıÂ deleted=${count}](red)'

[package]
symbol = '¾░Åù '

[python]
symbol          = '¯êÁ '
python_binary   = 'python3'

[scala]
symbol = '¯£À '

[aws]
format      = '[$symbol($profile )(\($region\) )(\[$duration\] )]($style)'
symbol      = '¯Ş¡ '
style       = 'lightblue bold'
disabled    = true

[azure]
format      = '[$symbol($subscription)]($style)'
symbol      = '¾░áà '
style       = 'lightblue bold'
disabled    = false

[azure.subscription_aliases]
pay-as-you-go-subscription = 'PAYG'

[kubernetes]
format      = 'via [¾▒â¥ $context\($namespace\)](bold purple)'
disabled    = false

[vagrant]
disabled = true

[helm]
disabled = true

[nodejs]
disabled = true

[ruby]
disabled = true