- name: Ensure Azure CLI is installed
  shell: |
    curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
  args:
    creates: /usr/bin/az

- name: Install Databricks Azure extension
  command: az extension add --name databricks
  ignore_errors: true

- name: Ensure Databricks CLI is installed
  pip:
    name: databricks-cli
    executable: pip3

# ---- AZURE LOGIN ----
- name: Check if already logged into Azure
  command: az account show
  register: az_login_check
  ignore_errors: true
  changed_when: false

- name: Login to Azure (interactive)
  command: az login
  when: az_login_check.rc != 0

- name: Set Azure subscription
  command: az account set --subscription "{{ azure_subscription_id }}"

# ---- DATABRICKS CONFIG ----
- name: Create .databrickscfg
  template:
    src: databricks.cfg.j2
    dest: "/home/{{ username }}/.databrickscfg"
    mode: '0600'