- name: Install dev packages
  apt:
    name: "{{ dev_packages }}"
    state: present

# Check pipx-installed apps to avoid re-installing
- name: Check pipx-installed apps
  become_user: "{{ username }}"
  ansible.builtin.command: pipx list --short
  register: pipx_list
  changed_when: false

# Install tldr with pipx
- name: Install tldr with pipx
  become_user: "{{ username }}"
  ansible.builtin.command: pipx install tldr
  when: "'tldr' not in pipx_list.stdout"

# Install eza (ls replacement)
- name: Download latest eza release (amd64)
  get_url:
    url: https://github.com/eza-community/eza/releases/download/{{ eza_version }}/eza_x86_64-unknown-linux-gnu.tar.gz
    dest: /tmp/eza.tar.gz
    mode: '0644'

- name: Extract eza binary
  unarchive:
    src: /tmp/eza.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Move eza binary to /usr/local/bin
  copy:
    src: /tmp/eza
    dest: /usr/local/bin/eza
    mode: '0755'
    remote_src: yes

- name: Cleanup eza archive
  file:
    path: /tmp/eza.tar.gz
    state: absent

