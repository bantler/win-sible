- name: Resolve shell target username
  ansible.builtin.set_fact:
    username: "{{ username | default(wsl_default_user | default(default_user | default(ansible_facts.get('user_id'))), true) }}"
    
- name: Probe apt availability for dev packages
  ansible.builtin.command: "apt-cache show {{ item }}"
  loop: "{{ dev_packages }}"
  register: dev_packages_probe
  changed_when: false
  failed_when: false

- name: Build installable and missing dev package lists
  ansible.builtin.set_fact:
    dev_packages_available: "{{ dev_packages_probe.results | selectattr('rc', 'equalto', 0) | map(attribute='item') | list }}"
    dev_packages_missing: "{{ dev_packages_probe.results | rejectattr('rc', 'equalto', 0) | map(attribute='item') | list }}"

- name: Install available dev packages
  ansible.builtin.apt:
    name: "{{ dev_packages_available }}"
    state: present
  when: dev_packages_available | length > 0

- name: Report missing dev packages
  ansible.builtin.debug:
    msg: "Skipping unavailable dev packages on this distro: {{ dev_packages_missing | join(', ') }}"
  when: dev_packages_missing | length > 0

# Detect current default shell for aliases module
- name: Detect current default shell for aliases module
  ansible.builtin.shell: |
    getent passwd {{ username }} | cut -d: -f7
  register: current_default_shell
  changed_when: false

- name: Resolve aliases module target from default shell
  ansible.builtin.set_fact:
    aliases_shell_name: "{{ 'zsh' if '/zsh' in current_default_shell.stdout else 'bash' }}"
    aliases_shell_dir: "{{ '.zsh' if '/zsh' in current_default_shell.stdout else '.bash' }}"
    aliases_shell_rc: "{{ '.zshrc' if '/zsh' in current_default_shell.stdout else '.bashrc' }}"

# Check pipx-installed apps to avoid re-installing
- name: Check pipx-installed apps
  become_user: "{{ username }}"
  ansible.builtin.command: pipx list
  register: pipx_list
  changed_when: false

# Install tldr with pipx
- name: Install tldr with pipx
  become_user: "{{ username }}"
  ansible.builtin.command: pipx install tldr
  when: pipx_list.stdout is not search('(?m)^\s*package\s+tldr\s')

# Install eza (ls replacement)
- name: Download latest eza release (amd64)
  get_url:
    url: https://github.com/eza-community/eza/releases/download/{{ eza_version }}/eza_x86_64-unknown-linux-gnu.tar.gz
    dest: /tmp/eza.tar.gz
    mode: '0644'

- name: Extract eza binary
  unarchive:
    src: /tmp/eza.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Move eza binary to /usr/local/bin
  copy:
    src: /tmp/eza
    dest: /usr/local/bin/eza
    mode: '0755'
    remote_src: yes

- name: Cleanup eza archive
  file:
    path: /tmp/eza.tar.gz
    state: absent

# Add zoxide init to default shell (bash or zsh)
- name: Initialize zoxide in default shell
  blockinfile:
    path: "/home/{{ username }}/{{ aliases_shell_rc }}"
    marker: "# {mark} ANSIBLE MANAGED ZOXIDE INIT"
    prepend_newline: yes
    block: |
      eval "$(zoxide init {{ aliases_shell_name }})"

# Add direnv init to default shell (bash or zsh)
- name: Initialize direnv in default shell
  blockinfile:
    path: "/home/{{ username }}/{{ aliases_shell_rc }}"
    marker: "# {mark} ANSIBLE MANAGED DIRENV INIT"
    prepend_newline: yes
    block: |
      eval "$(direnv hook {{ aliases_shell_name }})"

- name: Check if uv is installed
  become_user: "{{ username }}"
  ansible.builtin.shell: |
    export PATH="$HOME/.local/bin:$PATH"
    command -v uv
  args:
    executable: /bin/bash
  register: uv_version
  changed_when: false
  failed_when: false

- name: Ensure uv shell config dirs are writable by target user
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"
  loop:
    - "/home/{{ username }}/.config"
  when: uv_version.rc != 0

- name: Install uv
  become_user: "{{ username }}"
  ansible.builtin.shell: curl -LsSf https://astral.sh/uv/install.sh | sh -s -- --no-modify-path
  args:
    executable: /bin/bash
  register: uv_install
  failed_when:
    - uv_install.rc != 0
    - "'everything''s installed!' not in (uv_install.stdout | default('') | lower)"
  when: uv_version.rc != 0

- name: Configure Go env in default shell
  ansible.builtin.blockinfile:
    path: "/home/{{ username }}/{{ aliases_shell_rc }}"
    marker: "# {mark} ANSIBLE MANAGED GO ENV"
    prepend_newline: yes
    block: |
      export GOPATH="$HOME/go"
      export PATH="$PATH:$GOPATH/bin"

# Install tfenv (Terraform version manager)
- name: Ensure tfenv directory is owned by target user before clone/update
  ansible.builtin.file:
    path: "/home/{{ username }}/.tfenv"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    recurse: true

- name: Clone tfenv repository
  become_user: "{{ username }}"
  ansible.builtin.git:
    repo: https://github.com/tfutils/tfenv.git
    dest: "/home/{{ username }}/.tfenv"
    version: master

- name: Ensure tfenv directory is owned by target user
  ansible.builtin.file:
    path: "/home/{{ username }}/.tfenv"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    recurse: true

- name: Export tfenv in PATH for current shell
  blockinfile:
    path: "/home/{{ username }}/{{ aliases_shell_rc }}"
    marker: "# {mark} ANSIBLE MANAGED TFENV PATH"
    prepend_newline: yes
    block: |
      export PATH="$HOME/.tfenv/bin:$PATH"

# Add tfenv init to current shell rc file
- name: Enable tfenv in current shell
  blockinfile:
    path: "/home/{{ username }}/{{ aliases_shell_rc }}"
    marker: "# {mark} ANSIBLE MANAGED TFENV INIT"
    prepend_newline: yes
    block: |
      eval "$(tfenv init -)"

# Install terraform versions with tfenv
- name: Install pinned Terraform version
  become_user: "{{ username }}"
  shell: |
    export PATH="$HOME/.tfenv/bin:$PATH"
    tfenv install {{ terraform_version }}
    tfenv use {{ terraform_version }}
  when: terraform_version is defined

# Install Terraform autocomplete
- name: Install Terraform autocomplete
  become_user: "{{ username }}"
  ansible.builtin.shell: terraform -install-autocomplete
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false

- name: Check if GitHub Copilot CLI is installed
  ansible.builtin.command: copilot --version
  register: copilot_cli_version
  changed_when: false
  failed_when: false

- name: Install GitHub Copilot CLI
  ansible.builtin.shell: curl -fsSL https://gh.io/copilot-install | bash
  args:
    executable: /bin/bash
  when: copilot_cli_version.rc != 0

- name: Ensure aliases module directory exists for current shell
  ansible.builtin.file:
    path: "/home/{{ username }}/{{ aliases_shell_dir }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"

- name: Generate aliases module for current shell
  ansible.builtin.copy:
    dest: "/home/{{ username }}/{{ aliases_shell_dir }}/aliases.{{ aliases_shell_name }}"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0644"
    content: |
      # Alias

      alias cd="z"
      alias py=/usr/bin/python3
      alias tf='terraform'

      alias ls="eza --icons --group-directories-first --all"
      alias ll="eza --icons --group-directories-first -l --all"

